server {
    listen 80;
    listen [::]:80;
    server_name _;

    location / {
        root   /var/wwwroot-content/_fallback;
        index  index.html;

        error_log /var/log/www/_server/fallback-error.log;
        access_log /var/log/www/_server/fallback-access.log;

        try_files $uri $uri/ index.html;
    }
}
